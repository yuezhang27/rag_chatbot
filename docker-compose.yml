version: "3.9"

services:
  backend:
    build: .
    container_name: rag-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./chroma_db:/app/chroma_db

  frontend:
    build: ./frontend
    container_name: rag-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

